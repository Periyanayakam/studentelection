<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration - ElectVote</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style sheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="py-5 d-flex align-items-center justify-content-center min-vh-100" style="background: radial-gradient(circle at 50% 50%, rgba(13, 202, 240, 0.03) 0%, var(--bg-main) 100%);">

    <!-- Theme Switcher Top Corner -->
    <div class="position-fixed top-0 end-0 p-3">
        <button class="theme-toggle-btn btn shadow-sm" aria-label="Toggle Theme">
            <i class="bi bi-moon-fill"></i>
        </button>
    </div>

    <!-- Registration Container -->
    <div class="container animate-fade-in" style="max-width: 550px;">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none">
                <h1 class="text-primary fw-black"><i class="bi bi-shield-check-fill"></i> ElectVote</h1>
            </a>
            <p class="text-muted">Register to join the student voting registry</p>
        </div>

        <div class="card-premium p-4">
            <form class="needs-validation" novalidate id="register-form">
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="register-name" class="form-label font-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="register-name" placeholder="John Doe" required>
                        <div class="invalid-feedback">Please enter your full name.</div>
                    </div>
                </div>

                <div class="row">
                    <!-- Voter ID -->
                    <div class="col-md-6 mb-3">
                        <label for="register-voterid" class="form-label font-semibold">Voter ID Card Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-card-text text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="register-voterid" placeholder="VOT-100200" required>
                            <div class="invalid-feedback">Please enter your Voter ID.</div>
                        </div>
                    </div>

                    <!-- Mobile Number -->
                    <div class="col-md-6 mb-3">
                        <label for="register-mobile" class="form-label font-semibold">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone-fill text-muted"></i></span>
                            <input type="tel" class="form-control border-start-0 ps-0" id="register-mobile" placeholder="9988776655" pattern="[0-9]{10}" required>
                            <div class="invalid-feedback">Enter a valid 10-digit number.</div>
                        </div>
                    </div>
                </div>

                <!-- Email Address -->
                <div class="mb-3">
                    <label for="register-email" class="form-label font-semibold">University Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope-fill text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" id="register-email" placeholder="john@university.edu" required>
                        <div class="invalid-feedback">Please enter your student email address.</div>
                    </div>
                </div>

                <div class="row">
                    <!-- Password -->
                    <div class="col-md-6 mb-3">
                        <label for="register-password" class="form-label font-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="register-password" placeholder="••••••••" required>
                            <button type="button" class="btn btn-light border border-start-0 password-toggle-btn" data-target="register-password">
                                <i class="bi bi-eye-fill text-muted"></i>
                            </button>
                            <div class="invalid-feedback">Please enter a password.</div>
                        </div>
                        <!-- Strength Meter -->
                        <div class="password-strength-meter">
                            <div class="password-strength-bar" id="password-strength-bar"></div>
                        </div>
                        <div id="password-strength-text"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="col-md-6 mb-3">
                        <label for="register-confirm-password" class="form-label font-semibold">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="register-confirm-password" placeholder="••••••••" required>
                            <button type="button" class="btn btn-light border border-start-0 password-toggle-btn" data-target="register-confirm-password">
                                <i class="bi bi-eye-fill text-muted"></i>
                            </button>
                            <div class="invalid-feedback">Passwords must match.</div>
                        </div>
                    </div>
                </div>

                <!-- Register Button -->
                <button type="submit" class="btn btn-gradient w-100 text-white py-3 shadow mb-3" id="register-btn">
                    Register Account <i class="bi bi-person-plus-fill ms-1"></i>
                </button>

                <!-- Login Route -->
                <div class="text-center pt-2 border-top">
                    <p class="text-muted small mb-0">Already have an account? <a href="login.html" class="text-primary fw-semibold">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom scripts -->
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/validation.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            const form = e.target;
            if (form.checkValidity()) {
                e.preventDefault();
                
                const name = document.getElementById('register-name').value;
                const voterId = document.getElementById('register-voterid').value;
                const email = document.getElementById('register-email').value;
                const mobile = document.getElementById('register-mobile').value;
                const btn = document.getElementById('register-btn');
                
                btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing Application...';
                btn.disabled = true;

                setTimeout(() => {
                    // Save pending voter to database
                    const voters = db.getVoters();
                    voters.unshift({
                        id: 'V' + String(voters.length + 1).padStart(3, '0'),
                        name: name,
                        voterId: voterId,
                        email: email,
                        mobile: mobile,
                        status: 'pending',
                        registeredDate: new Date().toISOString().split('T')[0]
                    });
                    db.setVoters(voters);

                    // Update local voter object details
                    const defaultUser = db.getCurrentUser();
                    db.setCurrentUser({
                        ...defaultUser,
                        name: name,
                        email: email,
                        mobile: mobile,
                        voterId: voterId
                    });

                    showToast('Registration submitted! Awaiting administrator approval.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }, 1500);
            }
        });
    </script>
</body>
</html>
