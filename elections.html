<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elections List - ElectVote</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style sheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- Voter Header -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-shield-check-fill"></i> ElectVote
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="elections.html">Elections</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="candidates.html">Candidates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="results.html">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">My Profile</a>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="theme-toggle-btn btn" id="theme-toggle" aria-label="Toggle Theme">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item dropdown ms-3">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 border rounded-pill px-3 py-1" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span id="navbar-user-name">Alex Johnson</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="border-radius: var(--radius-sm);">
                            <li><a class="dropdown-menu-item dropdown-item py-2" href="profile.html"><i class="bi bi-person-fill me-2"></i> My Profile</a></li>
                            <li><a class="dropdown-menu-item dropdown-item py-2" href="elections.html"><i class="bi bi-card-checklist me-2"></i> View Ballot</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-menu-item dropdown-item py-2 text-danger" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container pt-5 mt-5 pb-5">
        <div class="row align-items-center mb-4 mt-3">
            <div class="col-md-6">
                <h2 class="fw-bold mb-1 text-primary">Elections Registry</h2>
                <p class="text-muted mb-0">Browse through active, upcoming, and completed university elections</p>
            </div>
            <!-- Search & Filters -->
            <div class="col-md-6 mt-3 mt-md-0">
                <div class="row g-2">
                    <div class="col-sm-8">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="election-search" placeholder="Search elections...">
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <select class="form-select" id="election-filter">
                            <option value="all">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="upcoming">Upcoming</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Elections Cards Grid -->
        <div class="row" id="elections-grid">
            <!-- Loading Skeletons -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card-premium h-100">
                    <div class="skeleton-loader skeleton-title"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 90%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 75%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 50%;"></div>
                    <div class="skeleton-loader skeleton-text mt-4" style="height: 35px; width: 100%;"></div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4 mb-4 d-none d-md-block">
                <div class="card-premium h-100">
                    <div class="skeleton-loader skeleton-title"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 90%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 75%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 50%;"></div>
                    <div class="skeleton-loader skeleton-text mt-4" style="height: 35px; width: 100%;"></div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4 mb-4 d-none d-lg-block">
                <div class="card-premium h-100">
                    <div class="skeleton-loader skeleton-title"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 90%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 75%;"></div>
                    <div class="skeleton-loader skeleton-text" style="width: 50%;"></div>
                    <div class="skeleton-loader skeleton-text mt-4" style="height: 35px; width: 100%;"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom scripts -->
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = checkVoterAuth();
            
            // Header Sync
            document.getElementById('navbar-user-name').textContent = user.name;
            const navAvatar = document.getElementById('nav-avatar');
            if (navAvatar && user.avatar) navAvatar.src = user.avatar;

            // Logout Binder
            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                logOutVoter();
            });
        });
    </script>
</body>
</html>
