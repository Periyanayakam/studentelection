<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Manifesto Summarizer - ElectVote</title>
  <meta name="description" content="Use AI-based keyword extraction to summarize long candidate manifestos.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container"></div>
  </nav>

  <div class="container" style="padding-top:110px;padding-bottom:60px;">
    <div class="manifesto-container">
      
      <div style="margin-bottom:2rem;text-align:center;">
        <h1 style="color:var(--primary);"><i class="bi bi-robot"></i> AI Manifesto Summarizer</h1>
        <p style="color:var(--text-secondary);margin-top:0.5rem;font-size:1.1rem;">
          Paste a long candidate manifesto below. Our client-side algorithm will instantly extract the core promises and key themes.
        </p>
      </div>

      <div class="card" style="padding:1.5rem;">
        <textarea id="manifesto-input" class="manifesto-input" placeholder="Paste the candidate's full manifesto here (e.g. 'I pledge to modernize our student council by launching a digital feedback platform...')"></textarea>
        
        <div style="text-align:right;margin-top:1rem;">
          <button id="summarize-btn" class="btn btn-primary">
            <i class="bi bi-magic"></i> Generate Summary
          </button>
        </div>
      </div>

      <!-- Result Box -->
      <div id="summary-result" class="summary-box">
        <h3 style="color:var(--primary);margin-bottom:1rem;"><i class="bi bi-card-checklist"></i> Key Extracted Promises</h3>
        <div id="summary-points-container" style="margin-bottom:1.5rem;"></div>
        
        <h4 style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:0.5rem;">Core Themes:</h4>
        <div id="summary-keywords-container"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { getToken, showToast, renderNavbar } from './js/app.js';
    renderNavbar();

    // Basic Stop Words
    const STOP_WORDS = new Set(["i", "me", "my", "myself", "we", "our", "ours", "ourselves", "you", "your", "yours", "yourself", "yourselves", "he", "him", "his", "himself", "she", "her", "hers", "herself", "it", "its", "itself", "they", "them", "their", "theirs", "themselves", "what", "which", "who", "whom", "this", "that", "these", "those", "am", "is", "are", "was", "were", "be", "been", "being", "have", "has", "had", "having", "do", "does", "did", "doing", "a", "an", "the", "and", "but", "if", "or", "because", "as", "until", "while", "of", "at", "by", "for", "with", "about", "against", "between", "into", "through", "during", "before", "after", "above", "below", "to", "from", "up", "down", "in", "out", "on", "off", "over", "under", "again", "further", "then", "once", "here", "there", "when", "where", "why", "how", "all", "any", "both", "each", "few", "more", "most", "other", "some", "such", "no", "nor", "not", "only", "own", "same", "so", "than", "too", "very", "s", "t", "can", "will", "just", "don", "should", "now"]);

    // Client-side NLP Extractive Summarizer
    function summarizeManifesto(text) {
      if (!text || text.length < 50) return null;

      // 1. Split into sentences
      const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
      
      // 2. Tokenize and calculate word frequencies (ignoring stop words)
      const words = text.toLowerCase().match(/\b[a-z]{3,}\b/g) || [];
      const wordFreq = {};
      let maxFreq = 0;

      words.forEach(w => {
        if (!STOP_WORDS.has(w)) {
          wordFreq[w] = (wordFreq[w] || 0) + 1;
          if (wordFreq[w] > maxFreq) maxFreq = wordFreq[w];
        }
      });

      // Normalize frequencies
      Object.keys(wordFreq).forEach(w => wordFreq[w] = wordFreq[w] / maxFreq);

      // 3. Score sentences based on word frequencies
      const sentenceScores = sentences.map(sentence => {
        const swords = sentence.toLowerCase().match(/\b[a-z]{3,}\b/g) || [];
        let score = 0;
        swords.forEach(w => {
          if (wordFreq[w]) score += wordFreq[w];
        });
        // Penalize very long sentences slightly
        score = score / (swords.length > 20 ? 1.5 : 1);
        return { text: sentence.trim(), score };
      });

      // 4. Sort and pick top N sentences (e.g. top 30%)
      sentenceScores.sort((a, b) => b.score - a.score);
      const limit = Math.max(2, Math.ceil(sentences.length * 0.35));
      const topSentences = sentenceScores.slice(0, limit);

      // Keep original chronological order for reading flow
      const orderedTop = sentences.filter(s => topSentences.find(ts => ts.text === s.trim()));

      // 5. Extract top keywords
      const topKeywords = Object.entries(wordFreq)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(e => e[0]);

      return { summary: orderedTop.map(s => s.trim()), keywords: topKeywords };
    }

    document.getElementById('summarize-btn').addEventListener('click', () => {
      const text = document.getElementById('manifesto-input').value;
      if (text.length < 50) {
        showToast('Please provide a longer manifesto to summarize (min 50 chars).', 'warning');
        return;
      }

      const btn = document.getElementById('summarize-btn');
      btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block;margin:0;vertical-align:middle;border-top-color:#fff;"></span> Processing...';
      btn.disabled = true;

      // Simulate AI processing delay
      setTimeout(() => {
        const result = summarizeManifesto(text);
        btn.innerHTML = '<i class="bi bi-magic"></i> Generate Summary';
        btn.disabled = false;

        if (!result) {
          showToast('Could not extract meaningful data.', 'error');
          return;
        }

        const ptsContainer = document.getElementById('summary-points-container');
        ptsContainer.innerHTML = result.summary.map(s => `
          <div class="summary-point">
            <i class="bi bi-check2-circle" style="color:var(--success);font-size:1.1rem;margin-top:2px;"></i>
            <span>${s}</span>
          </div>
        `).join('');

        const kwContainer = document.getElementById('summary-keywords-container');
        kwContainer.innerHTML = result.keywords.map(kw => `
          <span class="keyword-tag"><i class="bi bi-tag-fill" style="font-size:0.65rem;margin-right:2px;"></i> ${kw}</span>
        `).join('');

        document.getElementById('summary-result').classList.add('visible');
        document.getElementById('summary-result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 800);
    });
  </script>
</body>
</html>
