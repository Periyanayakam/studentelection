<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ElectVote</title>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <a href="index.html">
        <h1><i class="bi bi-shield-check-fill"></i> ElectVote</h1>
      </a>
      <p>Create a secure registration to cast your digital ballot</p>
    </div>

    <div class="card auth-card">
      <form id="register-form">
        <!-- Fullname -->
        <div class="form-group">
          <label for="fullname" class="form-label">Full Name</label>
          <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="+1234567890">
        </div>

        <!-- Role -->
        <div class="form-group">
          <label for="role" class="form-label">Account Role</label>
          <select id="role" class="form-control">
            <option value="voter" selected>Voter</option>
            <option value="admin">Administrator</option>
          </select>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Register Account <i class="bi bi-person-plus-fill"></i>
        </button>
      </form>

      <div class="auth-links">
        <p>Already have an account? <a href="login.html">Sign in here</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, showToast } from './js/app.js';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullname = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
      }

      try {
        const data = await apiFetch('/register', {
          method: 'POST',
          body: JSON.stringify({ fullname, email, phone, password, role })
        });

        if (data && data.success) {
          showToast(data.message, 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showToast(data?.message || 'Registration failed', 'error');
        }
      } catch (err) {
        showToast('An error occurred during registration', 'error');
      }
    });
  </script>
</body>
</html>
