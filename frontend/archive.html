<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Archive - ElectVote</title>
  <meta name="description" content="View past elections, winners, and turnout statistics in the digital archive.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container"></div>
  </nav>

  <div class="container" style="padding-top:110px;padding-bottom:60px;">
    
    <div style="margin-bottom:2rem; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1><i class="bi bi-archive-fill"></i> Digital Election Archive</h1>
        <p style="color:var(--text-secondary);margin-top:0.5rem;">A permanent record of past elections, turnout, and final results.</p>
      </div>
      <a href="dashboard.html" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="spinner" id="archive-spinner"></div>
    
    <div class="archive-grid" id="archive-grid" style="display:none;">
      <!-- Cards rendered dynamically -->
    </div>

    <div id="archive-empty" class="card" style="display:none; text-align:center; padding:3rem;">
      <i class="bi bi-inbox-fill" style="font-size:3rem;color:var(--text-muted);display:block;margin-bottom:1rem;"></i>
      <h3 style="color:var(--text-secondary);">No Past Elections Found</h3>
      <p style="color:var(--text-muted);margin-top:0.5rem;">Elections will appear here automatically once their status changes to completed.</p>
    </div>

  </div>

  <script type="module">
    import { apiFetch, getToken, showToast, renderNavbar, timeAgo } from './js/app.js';

    if (!getToken()) window.location.href = 'login.html';
    renderNavbar();

    const loadArchive = async () => {
      try {
        const data = await apiFetch('/archive');
        document.getElementById('archive-spinner').style.display = 'none';

        if (data?.success) {
          const grid = document.getElementById('archive-grid');
          if (data.archive.length === 0) {
            document.getElementById('archive-empty').style.display = 'block';
            return;
          }

          data.archive.forEach(el => {
            const card = document.createElement('div');
            card.className = 'archive-card';
            
            let winnerHtml = '<div style="color:var(--text-muted);font-size:0.85rem;margin:1rem 0;">No winner data (0 votes)</div>';
            if (el.winner) {
              winnerHtml = `
                <div class="archive-winner">
                  <i class="bi bi-trophy-fill" style="color:var(--warning);font-size:1.2rem;"></i>
                  <div>
                    <strong>${el.winner.name}</strong> (${el.winner.party})<br>
                    <span style="font-size:0.8rem;color:var(--text-secondary);">${el.winner.votes} total votes</span>
                  </div>
                </div>
              `;
            }

            card.innerHTML = `
              <h3 style="font-size:1.2rem;margin-bottom:0.5rem;">${el.title}</h3>
              <p style="font-size:0.85rem;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
                ${el.description || 'No description available.'}
              </p>
              
              ${winnerHtml}

              <div class="archive-meta">
                <span><i class="bi bi-people-fill"></i> ${el.candidate_count} Candidates</span>
                <span><i class="bi bi-envelope-paper-fill"></i> ${el.total_votes} Ballots Cast</span>
                <span><i class="bi bi-calendar-check-fill"></i> Ended ${new Date(el.end_date).toLocaleDateString()}</span>
              </div>

              <div style="margin-top:1.5rem;text-align:right;">
                <a href="results.html?election_id=${el.id}" class="btn btn-secondary btn-sm" style="width:100%;">
                  View Full Report <i class="bi bi-arrow-right"></i>
                </a>
              </div>
            `;
            grid.appendChild(card);
          });
          grid.style.display = 'grid';
        } else {
          showToast('Failed to load archive', 'error');
        }
      } catch (err) {
        document.getElementById('archive-spinner').style.display = 'none';
        showToast('Error connecting to server', 'error');
      }
    };

    loadArchive();
  </script>
</body>
</html>
