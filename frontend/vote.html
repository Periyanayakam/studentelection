<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Booth - ElectVote</title>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .candidate-row.selected {
      border-color: var(--primary);
      background-color: var(--primary-light);
      box-shadow: 0 0 0 3px var(--primary);
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <!-- Rendered dynamically by app.js -->
    </div>
  </nav>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">
    <div class="voting-container">
      <div class="voting-header" style="position:relative;">
        <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
          <a href="dashboard.html" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
          </a>
          <a href="compare.html" class="btn btn-secondary btn-sm" id="booth-compare-btn" style="display:none;">
            <i class="bi bi-layout-split"></i> Compare Candidates
          </a>
        </div>
        <h1 id="election-title">Loading Election...</h1>
        <p id="election-description" style="margin-bottom:1.5rem;">Please choose a candidate below to cast your vote.</p>
        <div id="timeline-container"></div>
      </div>

      <div class="spinner" id="booth-spinner"></div>

      <!-- Candidate Selection Area -->
      <div class="candidates-booth" id="candidates-container" style="display: none;">
        <!-- Candidates loaded dynamically -->
      </div>

      <!-- Submit Section -->
      <div id="submit-section" style="display: none; text-align: center; margin-top: 3rem;">
        <button id="cast-vote-btn" class="btn btn-primary btn-lg" disabled>
          Cast Secure Ballot <i class="bi bi-check2-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal" id="confirm-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Confirm Your Ballot</h3>
        <button class="modal-close" id="modal-close-x">&times;</button>
      </div>
      <p style="margin-bottom: 1.5rem;">
        You are about to cast your vote for <strong id="modal-candidate-name">Candidate</strong> of <strong id="modal-candidate-party">Party</strong>.
      </p>
      <div class="badge badge-warning" style="margin-bottom: 1.5rem; display: block; text-align: center; padding: 0.75rem;">
        <i class="bi bi-exclamation-triangle-fill"></i> WARNING: You can only vote ONCE. This action is irreversible.
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm-btn">Confirm Vote</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, getToken, showToast, renderNavbar, buildTimeline } from './js/app.js';

    if (!getToken()) {
      window.location.href = 'login.html';
    }

    renderNavbar();

    // Get URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const electionId = urlParams.get('election_id');

    if (!electionId) {
      showToast('No election selected', 'error');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    }

    let selectedCandidate = null;
    let electionDetails = null;

    // Load Election Info and Candidates
    const loadBooth = async () => {
      try {
        // Fetch Elections to find description and title
        const elData = await apiFetch('/elections');
        if (elData && elData.success) {
          electionDetails = elData.elections.find(e => e.id == electionId);
          if (!electionDetails) {
            showToast('Election not found', 'error');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
            return;
          }

          if (electionDetails.status !== 'active') {
            showToast('Voting is only open for ACTIVE elections', 'error');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
            return;
          }

          if (electionDetails.is_sandbox) {
            document.getElementById('election-title').innerHTML = `<i class="bi bi-cone-striped" style="color:var(--warning)"></i> [Sandbox] ` + electionDetails.title;
          } else {
            document.getElementById('election-title').textContent = electionDetails.title;
          }
          document.getElementById('election-description').textContent = electionDetails.description || 'Please choose a candidate below to cast your vote.';
          document.getElementById('timeline-container').appendChild(buildTimeline(electionDetails.phase));
          document.getElementById('booth-compare-btn').style.display = 'inline-flex';
        }

        // Fetch Candidates
        const candData = await apiFetch(`/candidates?election_id=${electionId}`);
        document.getElementById('booth-spinner').style.display = 'none';

        if (candData && candData.success) {
          const container = document.getElementById('candidates-container');
          container.innerHTML = '';

          if (candData.candidates.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No candidates are registered in this election.</p>';
            container.style.display = 'block';
            return;
          }

          candData.candidates.forEach(candidate => {
            const row = document.createElement('div');
            row.className = 'candidate-row';
            row.dataset.id = candidate.id;
            row.dataset.name = candidate.name;
            row.dataset.party = candidate.party;

            const photoHtml = candidate.photo 
              ? `<img src="${candidate.photo}" alt="${candidate.name}" class="candidate-avatar">`
              : `<div class="candidate-avatar-fallback"><i class="bi bi-person-fill"></i></div>`;

            const symbolHtml = candidate.symbol 
              ? `<i class="candidate-symbol-icon bi ${candidate.symbol}"></i>`
              : `<i class="candidate-symbol-icon bi bi-stars"></i>`;

            const badges = Array.isArray(candidate.achievements) ? candidate.achievements : [];
            const badgeHtml = badges.map(b => `<span class="badge-chip" style="font-size:0.65rem;padding:0.15rem 0.4rem;margin-top:0.35rem;margin-right:0.25rem;"><i class="bi ${b}"></i></span>`).join('');

            row.innerHTML = `
              <div class="candidate-profile-summary" style="flex:1;">
                ${photoHtml}
                <div class="candidate-info" style="flex:1;">
                  <h3>${candidate.name} <span style="font-size:0.85rem;color:var(--text-muted);font-weight:400;margin-left:0.5rem;">${candidate.department ? '('+candidate.department+')' : ''}</span></h3>
                  <p class="party">${candidate.party}</p>
                  <div>${badgeHtml}</div>
                  ${candidate.manifesto ? `<p style="font-size:0.8rem;color:var(--text-secondary);margin-top:0.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">"${candidate.manifesto}"</p>` : ''}
                </div>
              </div>
              <div style="flex-shrink:0;">
                ${symbolHtml}
              </div>
            `;

            row.addEventListener('click', () => {
              document.querySelectorAll('.candidate-row').forEach(r => r.classList.remove('selected'));
              row.classList.add('selected');
              selectedCandidate = {
                id: candidate.id,
                name: candidate.name,
                party: candidate.party
              };
              document.getElementById('cast-vote-btn').removeAttribute('disabled');
            });

            container.appendChild(row);
          });

          container.style.display = 'flex';
          document.getElementById('submit-section').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('booth-spinner').style.display = 'none';
        showToast('Failed to load election details', 'error');
      }
    };

    loadBooth();

    // Modal Control
    const modal = document.getElementById('confirm-modal');
    const openModal = () => {
      if (!selectedCandidate) return;
      document.getElementById('modal-candidate-name').textContent = selectedCandidate.name;
      document.getElementById('modal-candidate-party').textContent = selectedCandidate.party;
      modal.style.display = 'flex';
    };

    const closeModal = () => {
      modal.style.display = 'none';
    };

    document.getElementById('cast-vote-btn').addEventListener('click', openModal);
    document.getElementById('modal-close-x').addEventListener('click', closeModal);
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // Confirm Vote Execution
    document.getElementById('modal-confirm-btn').addEventListener('click', async () => {
      closeModal();
      
      try {
        const result = await apiFetch('/vote', {
          method: 'POST',
          body: JSON.stringify({
            election_id: parseInt(electionId, 10),
            candidate_id: selectedCandidate.id
          })
        });

        if (result && result.success) {
          showToast(result.message, 'success');
          // Add a minor delayed redirect
          setTimeout(() => {
            window.location.href = 'dashboard.html?voted=true';
          }, 1500);
        } else {
          showToast(result?.message || 'Failed to submit ballot', 'error');
        }
      } catch (err) {
        showToast('An error occurred submitting vote', 'error');
      }
    });
  </script>
</body>
</html>
